<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Story Generator V4 - Art Card Edition</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- modern-screenshot -->
    <script src="https://cdn.jsdelivr.net/npm/modern-screenshot@4.6.8/dist/index.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Shippori Mincho"', 'serif'],
                        display: ['"Cormorant Garamond"', 'serif'],
                        cinzel: ['"Cinzel"', 'serif'],
                        'cinzel-deco': ['"Cinzel Decorative"', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Shippori Mincho', serif;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 40px;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        /* Canvas Container - Story */
        #canvas-wrapper {
            position: sticky;
            top: 40px;
            display: flex;
            justify-content: center;
        }

        #canvas-container {
            width: 1080px;
            height: 1920px;
            background-color: #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            transform-origin: top center;
            transform: scale(0.35);
            margin-bottom: -1240px;
        }

        #canvas-container.format-feed {
            width: 1080px;
            height: 1080px;
            margin-bottom: -700px;
        }

        /* Background */
        .bg-image-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Bottom gradient for text readability */
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Content overlay */
        .canvas-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 60px;
        }

        /* Number badge */
        .number-badge {
            display: inline-flex;
            flex-direction: column;
            line-height: 1;
        }

        .number-badge .label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .number-badge .num {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            line-height: 0.85;
        }



        /* Control Panel */
        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }

        input, textarea, select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 8px !important;
            padding: 12px !important;
            width: 100%;
            margin-top: 8px;
            margin-bottom: 20px;
            font-family: 'Shippori Mincho', serif;
        }

        input[type="color"] {
            padding: 4px !important;
            height: 48px;
            cursor: pointer;
        }

        input[type="range"] {
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
            margin-top: 12px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 24px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .download-btn {
            background: linear-gradient(135deg, #ffd700 0%, #fdb931 100%);
            color: black;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }

        .format-selector {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .format-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #86868b;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-align: center;
        }

        .format-btn.active {
            background: #ffd700;
            border-color: #ffd700;
            color: black;
        }

        .object-position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .pos-btn {
            padding: 8px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #86868b;
            font-size: 0.65rem;
            cursor: pointer;
            text-align: center;
        }

        .pos-btn.active {
            background: #ffd700;
            border-color: #ffd700;
            color: black;
        }

        .image-upload-area {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
        }

        .inline-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
    </style>
</head>

<body>

    <div class="mb-12 text-center">
        <h1 class="text-4xl font-black mb-2 tracking-tight">Instagram Story Generator V4</h1>
        <p class="text-[#86868b] font-serif text-sm tracking-wider">Art Card Edition — 美術作品紹介カード</p>
    </div>

    <div class="app-container">
        <!-- Preview -->
        <div id="canvas-wrapper">
            <div id="canvas-container">
                <!-- Background Image -->
                <div id="bg-layer" class="bg-image-layer"
                    style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Claude_Monet_-_Le_d%C3%A9jeuner_sur_l%27herbe.jpg/1280px-Claude_Monet_-_Le_d%C3%A9jeuner_sur_l%27herbe.jpg');">
                </div>

                <!-- Gradient Overlay -->
                <div id="gradient-overlay" class="gradient-overlay" style="background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 45%, rgba(0,0,0,0.75) 70%, rgba(0,0,0,0.92) 100%);"></div>

                <!-- Content -->
                <div class="canvas-content">
                    <!-- Top Row: Number + Tag -->
                    <div class="flex justify-between items-start">
                        <!-- Number Badge -->
                        <div class="number-badge">
                            <span id="preview-number-label" class="label text-white/70" style="font-size: 22px;">NO.</span>
                            <span id="preview-number" class="num text-white" style="font-size: 82px;">01</span>
                        </div>


                    </div>

                    <!-- Spacer -->
                    <div class="flex-1"></div>

                    <!-- Bottom Text Block -->
                    <div>


                        <!-- Title -->
                        <h2 id="preview-title" class="font-serif text-white leading-tight" style="font-size: 80px; font-weight: 800;">
                            《昼食》
                        </h2>

                        <!-- Divider -->
                        <div id="preview-divider" class="mt-8 mb-8" style="width: 80px; height: 3px; background-color: #c0392b;"></div>

                        <!-- Description -->
                        <p id="preview-description" class="font-serif text-white/85 leading-relaxed" style="font-size: 34px; line-height: 1.9; font-weight: 400;">
                            モネが家族との日常を描いた、穏やかで光に満ちた初期の傑作。テーブルの上の静物と木漏れ日が美しい。
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-panel">
            <h3 class="section-title" style="margin-top: 0;">Format</h3>
            <label>Output Format</label>
            <div class="format-selector">
                <button class="format-btn active" data-format="story" onclick="setFormat('story')">Story 9:16</button>
                <button class="format-btn" data-format="feed" onclick="setFormat('feed')">Feed 1:1</button>
            </div>

            <h3 class="section-title">Number</h3>
            <div class="inline-row">
                <div>
                    <label for="input-number-label">Label</label>
                    <input type="text" id="input-number-label" value="NO.">
                </div>
                <div>
                    <label for="input-number">Number</label>
                    <input type="text" id="input-number" value="01">
                </div>
            </div>

            <h3 class="section-title">Content</h3>
            <label for="input-title">Title (Japanese)</label>
            <input type="text" id="input-title" value="《昼食》">

            <label for="input-title-size">Title Size (px)</label>
            <div class="flex gap-4 items-center mb-5">
                <input type="range" id="input-title-size" min="20" max="300" value="80" class="flex-1 !mb-0">
                <input type="number" id="input-title-size-num" value="80" class="!w-24 !mt-0 !mb-0">
            </div>

            <label for="input-description">Description</label>
            <textarea id="input-description" rows="3">モネが家族との日常を描いた、穏やかで光に満ちた初期の傑作。テーブルの上の静物と木漏れ日が美しい。</textarea>

            <h3 class="section-title">Style</h3>
            <label for="input-accent-color">Accent Color</label>
            <input type="color" id="input-accent-color" value="#c0392b">

            <h3 class="section-title">Image</h3>
            <label for="input-image">Background Artwork</label>
            <div class="mt-2 mb-5">
                <label for="input-image" class="image-upload-area">
                    <input type="file" id="input-image" accept="image/*" class="hidden">
                    <span id="upload-text" class="text-[#86868b]">画像をアップロード</span>
                </label>
            </div>

            <label>Image Position</label>
            <div class="inline-row !mb-0">
                <div>
                    <label for="input-pos-x">X Offset (px)</label>
                    <input type="number" id="input-pos-x" value="0" class="!mb-2">
                </div>
                <div>
                    <label for="input-pos-y">Y Offset (px)</label>
                    <input type="number" id="input-pos-y" value="0" class="!mb-2">
                </div>
            </div>
            <div class="object-position-grid">
                <button class="pos-btn" data-pos="top left" onclick="setPos('top left')">左上</button>
                <button class="pos-btn" data-pos="top center" onclick="setPos('top center')">上</button>
                <button class="pos-btn" data-pos="top right" onclick="setPos('top right')">右上</button>
                <button class="pos-btn" data-pos="center left" onclick="setPos('center left')">左</button>
                <button class="pos-btn active" data-pos="center center" onclick="setPos('center center')">中央</button>
                <button class="pos-btn" data-pos="center right" onclick="setPos('center right')">右</button>
                <button class="pos-btn" data-pos="bottom left" onclick="setPos('bottom left')">左下</button>
                <button class="pos-btn" data-pos="bottom center" onclick="setPos('bottom center')">下</button>
                <button class="pos-btn" data-pos="bottom right" onclick="setPos('bottom right')">右下</button>
            </div>

            <button onclick="downloadStory()" class="download-btn">
                <span>Export (PNG)</span>
            </button>
            <p id="export-resolution" class="text-center text-[#86868b] text-xs mt-4">2160 x 3840 High Resolution</p>
        </div>
    </div>

    <script>
        let currentFormat = 'story';

        // === Simple text bindings ===
        const textBindings = [
            { id: 'input-number-label', target: 'preview-number-label' },
            { id: 'input-number', target: 'preview-number' },

            { id: 'input-title', target: 'preview-title' },
            { id: 'input-description', target: 'preview-description' },
        ];

        textBindings.forEach(b => {
            document.getElementById(b.id).addEventListener('input', e => {
                document.getElementById(b.target).innerText = e.target.value;
            });
        });



        // === Title size ===
        const titleSizeRange = document.getElementById('input-title-size');
        const titleSizeNum = document.getElementById('input-title-size-num');
        const previewTitle = document.getElementById('preview-title');

        function updateTitleSize(val) {
            previewTitle.style.fontSize = val + 'px';
            titleSizeRange.value = val;
            titleSizeNum.value = val;
        }

        titleSizeRange.addEventListener('input', e => updateTitleSize(e.target.value));
        titleSizeNum.addEventListener('input', e => updateTitleSize(e.target.value));

        // === Accent color (tag bg + divider) ===
        document.getElementById('input-accent-color').addEventListener('input', e => {
            const color = e.target.value;
            document.getElementById('preview-divider').style.backgroundColor = color;
        });

        // === Image upload ===
        document.getElementById('input-image').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    document.getElementById('bg-layer').style.backgroundImage = `url('${event.target.result}')`;
                    document.getElementById('upload-text').innerText = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // === Position ===
        const posXInput = document.getElementById('input-pos-x');
        const posYInput = document.getElementById('input-pos-y');
        const bgLayer = document.getElementById('bg-layer');

        function setPos(pos) {
            bgLayer.style.backgroundPosition = pos;
            document.querySelectorAll('.pos-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.pos === pos);
            });
            // Reset pixel inputs to a logical 0 or similar when using keywords
            // Though mapping keyword to px is complex, we just clear them to show they aren't in sync
            posXInput.value = 0;
            posYInput.value = 0;
        }

        function updatePosPx() {
            const x = posXInput.value || 0;
            const y = posYInput.value || 0;
            bgLayer.style.backgroundPosition = `${x}px ${y}px`;
            
            // Deactivate preset buttons
            document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
        }

        posXInput.addEventListener('input', updatePosPx);
        posYInput.addEventListener('input', updatePosPx);

        // === Format ===
        function setFormat(format) {
            currentFormat = format;
            const container = document.getElementById('canvas-container');
            container.classList.toggle('format-feed', format === 'feed');
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.format === format);
            });
            document.getElementById('export-resolution').innerText =
                format === 'story' ? '2160 x 3840 High Resolution' : '2160 x 2160 High Resolution';
        }

        // === Export ===
        async function downloadStory() {
            if (document.fonts) {
                await document.fonts.ready;
            }

            const canvasContainer = document.getElementById('canvas-container');
            const btn = document.querySelector('.download-btn');
            const originalBtnText = btn.innerHTML;

            btn.innerHTML = 'Generating...';
            btn.disabled = true;

            const width = 1080;
            const height = currentFormat === 'story' ? 1920 : 1080;

            const savedTransform = canvasContainer.style.transform;
            const savedMarginBottom = canvasContainer.style.marginBottom;
            const savedBoxShadow = canvasContainer.style.boxShadow;

            canvasContainer.style.transform = 'none';
            canvasContainer.style.marginBottom = '0';
            canvasContainer.style.boxShadow = 'none';

            try {
                const blob = await modernScreenshot.domToBlob(canvasContainer, {
                    width: width,
                    height: height,
                    scale: 2,
                });

                const titleVal = document.getElementById('input-title').value
                    .replace(/[《》\s]+/g, '_').replace(/^_|_$/g, '') || 'export';
                const formatName = currentFormat === 'story' ? 'Story' : 'Feed';
                const fileName = `${formatName}_${titleVal}.png`;

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = fileName;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            } catch (err) {
                console.error(err);
                alert('書き出し中にエラーが発生しました。');
            } finally {
                canvasContainer.style.transform = savedTransform;
                canvasContainer.style.marginBottom = savedMarginBottom;
                canvasContainer.style.boxShadow = savedBoxShadow;

                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
