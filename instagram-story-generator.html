<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Story Generator - Local Edition</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Zen Kaku Gothic New"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    },
                    colors: {
                        'vermeer-blue': '#004F9F',
                        'vermeer-yellow': '#D4AF37',
                        'apple-gray': '#86868b',
                        'off-black': '#0a0a0a',
                        'spec-border': '#333',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #1a1a1a;
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }

        /* Layout Grid */
        .app-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 16px 8px;
            }

            .app-container {
                gap: 20px;
            }

            #canvas-wrapper {
                position: relative;
                top: 0;
            }

            .control-panel {
                padding: 20px 16px;
                border-radius: 16px;
            }

            .slider-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            h1.text-4xl {
                font-size: 1.5rem;
            }

            .color-preset {
                width: 40px;
                height: 40px;
            }

            .format-btn {
                padding: 14px 12px;
                font-size: 0.8rem;
            }

            input[type="range"] {
                height: 10px;
            }

            input[type="range"]::-webkit-slider-thumb {
                width: 28px;
                height: 28px;
            }

            .download-btn {
                padding: 18px;
                font-size: 1rem;
            }

            .image-upload-area {
                padding: 32px 16px;
            }
        }

        /* Canvas Container */
        #canvas-wrapper {
            position: sticky;
            top: 40px;
            display: flex;
            justify-content: center;
        }

        #canvas-container {
            width: 1080px;
            height: 1920px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            transform-origin: top center;
            /* scale is set dynamically by JS */
        }

        #canvas-container.format-feed {
            width: 1080px;
            height: 1080px;
        }

        #canvas-container.format-feed .canvas-content {
            padding-top: 80px;
            padding-bottom: 80px;
        }

        #canvas-container.format-feed .image-frame {
            height: 500px;
        }

        #canvas-container.format-feed .specs-section {
            display: none;
        }

        /* Text accent color */
        .text-accent {
            color: var(--accent-color, #ffd700);
        }

        /* Image Frame - fixed size container */
        .image-frame {
            width: 920px;
            height: 700px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6));
        }

        /* Control Panel Styles */
        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }

        input,
        textarea,
        select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 8px !important;
            padding: 12px !important;
            width: 100%;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        input[type="color"] {
            padding: 4px !important;
            height: 48px;
            cursor: pointer;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #D4AF37 !important;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--accent-color, #ffd700) 0%, var(--accent-color-dark, #fdb931) 100%);
            color: black;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        /* Image Upload Area */
        .image-upload-area {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload-area:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }

        .upload-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #86868b;
        }

        .image-upload-area:hover .upload-content {
            color: #D4AF37;
        }

        /* Format Selector */
        .format-selector {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .format-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #86868b;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .format-btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .format-btn.active {
            background: var(--accent-color, #ffd700);
            border-color: var(--accent-color, #ffd700);
            color: black;
        }

        /* Color Presets */
        .color-presets {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .color-preset {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-preset:hover {
            transform: scale(1.1);
        }

        .color-preset.active {
            border-color: white;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        }

        /* Section divider */
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 24px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            border: none !important;
            padding: 0 !important;
            margin-top: 12px;
            margin-bottom: 20px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color, #ffd700);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Smooth image frame transitions */
        .image-frame {
            transition: width 0.3s ease, height 0.3s ease;
        }

        .canvas-content {
            transition: padding-top 0.3s ease, padding-bottom 0.3s ease;
        }

        .main-image {
            transition: border-radius 0.3s ease, filter 0.3s ease, transform 0.3s ease;
        }

        /* Slider row layout */
        .slider-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .slider-row label {
            display: block;
        }

        .slider-row input[type="range"] {
            margin-bottom: 12px;
        }

        /* Gradient toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
            margin: 0 !important;
            padding: 0 !important;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-color, #ffd700);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>

    <div class="mb-12 text-center">
        <h1 class="text-4xl font-black mb-2 tracking-tight">Instagram Story Generator</h1>
        <p class="text-apple-gray">ローカル編集・高画質書き出しツール</p>
    </div>

    <div class="app-container">
        <!-- Preview Section -->
        <div id="canvas-wrapper">
            <div id="canvas-container" class="flex flex-col bg-black relative">
                <div class="canvas-content flex flex-col h-full px-12 pt-[200px] pb-[220px]">

                    <!-- Header -->
                    <div class="relative z-10 text-center mb-12 shrink-0">
                        <p id="preview-tag" class="text-accent text-xl font-bold tracking-[0.3em] uppercase mb-4">
                            New Video</p>
                        <h1 class="text-6xl font-black leading-tight mb-8">
                            <span id="preview-heading-pre" class="text-white">新作、</span><span id="preview-heading-post"
                                class="text-accent">公開しました。</span>
                        </h1>

                        <div class="flex flex-col items-center justify-center pt-2">
                            <p id="preview-artist"
                                class="text-xl text-apple-gray font-medium tracking-[0.2em] mb-2 uppercase">フィンセント・ファン・ゴッホ
                            </p>
                            <h2 id="preview-title" class="text-6xl font-bold text-white tracking-tight">ローヌ川の星月夜</h2>
                        </div>
                    </div>

                    <!-- Product Shot Area -->
                    <div class="relative z-10 w-full flex justify-center mb-10 shrink-0">
                        <div class="image-frame">
                            <img id="main-visual"
                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Starry_Night_Over_the_Rhone.jpg/3840px-Starry_Night_Over_the_Rhone.jpg"
                                alt="Starry Night Over the Rhône"
                                class="main-image">
                        </div>
                    </div>

                    <!-- Product Code -->
                    <p id="preview-code"
                        class="text-center text-xs text-gray-600 font-mono mb-8 tracking-widest uppercase shrink-0">
                        1888 / Musée d'Orsay
                    </p>

                    <!-- Specs List -->
                    <div class="specs-section relative z-10 px-6 space-y-6 mt-2 flex-grow flex flex-col justify-center">

                        <div class="border-b border-spec-border pb-4 flex justify-between items-baseline">
                            <h4 class="text-xl font-medium text-apple-gray">画家</h4>
                            <p id="preview-spec-artist" class="text-2xl text-white font-medium text-right">フィンセント・ファン・ゴッホ
                            </p>
                        </div>

                        <div class="border-b border-spec-border pb-4 flex justify-between items-baseline">
                            <h4 class="text-xl font-medium text-apple-gray">公開年</h4>
                            <p id="preview-spec-year" class="text-2xl text-white font-medium text-right">1888年</p>
                        </div>

                        <div class="pb-2">
                            <div class="flex justify-between items-baseline mb-1">
                                <h4 class="text-xl font-medium text-apple-gray">画材</h4>
                                <p id="preview-spec-medium" class="text-2xl text-white font-medium text-right">油彩、キャンバス</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="control-panel">
            <h3 class="section-title">Format</h3>

            <label>Output Format</label>
            <div class="format-selector">
                <button class="format-btn active" data-format="story" onclick="setFormat('story')">
                    Story<br><span style="font-weight:400;opacity:0.7">9:16</span>
                </button>
                <button class="format-btn" data-format="feed" onclick="setFormat('feed')">
                    Feed<br><span style="font-weight:400;opacity:0.7">1:1</span>
                </button>
            </div>

            <h3 class="section-title">Design</h3>

            <label>Background Color</label>
            <div class="color-presets" id="bg-presets">
                <div class="color-preset active" style="background: #000000;" data-color="#000000" onclick="setBgColor('#000000')"></div>
                <div class="color-preset" style="background: #1a1a1a;" data-color="#1a1a1a" onclick="setBgColor('#1a1a1a')"></div>
                <div class="color-preset" style="background: #ffffff;" data-color="#ffffff" onclick="setBgColor('#ffffff')"></div>
                <div class="color-preset" style="background: #0a1628;" data-color="#0a1628" onclick="setBgColor('#0a1628')"></div>
            </div>
            <input type="color" id="input-bg-color" value="#000000" onchange="setBgColor(this.value)">

            <div class="toggle-row">
                <label style="margin:0">グラデーション背景</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="input-gradient-toggle" onchange="toggleGradient(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div id="gradient-controls" style="display:none;">
                <label>グラデーション 2色目</label>
                <div class="color-presets" id="gradient-presets">
                    <div class="color-preset active" style="background: #1a1a2e;" data-color="#1a1a2e" onclick="setGradientColor('#1a1a2e')"></div>
                    <div class="color-preset" style="background: #16213e;" data-color="#16213e" onclick="setGradientColor('#16213e')"></div>
                    <div class="color-preset" style="background: #0f3460;" data-color="#0f3460" onclick="setGradientColor('#0f3460')"></div>
                    <div class="color-preset" style="background: #533483;" data-color="#533483" onclick="setGradientColor('#533483')"></div>
                </div>
                <input type="color" id="input-gradient-color" value="#1a1a2e" onchange="setGradientColor(this.value)">

                <label for="input-gradient-angle">グラデーション角度 <span id="gradient-angle-value" style="color: #D4AF37;">180°</span></label>
                <input type="range" id="input-gradient-angle" min="0" max="360" value="180" style="cursor: pointer;">
            </div>

            <label>Accent Color</label>
            <div class="color-presets" id="accent-presets">
                <div class="color-preset active" style="background: #ffd700;" data-color="#ffd700" onclick="setAccentColor('#ffd700')"></div>
                <div class="color-preset" style="background: #ff6b6b;" data-color="#ff6b6b" onclick="setAccentColor('#ff6b6b')"></div>
                <div class="color-preset" style="background: #4ecdc4;" data-color="#4ecdc4" onclick="setAccentColor('#4ecdc4')"></div>
                <div class="color-preset" style="background: #a855f7;" data-color="#a855f7" onclick="setAccentColor('#a855f7')"></div>
            </div>
            <input type="color" id="input-accent-color" value="#ffd700" onchange="setAccentColor(this.value)">

            <h3 class="section-title">Content</h3>

            <label for="input-tag">Tag Line</label>
            <input type="text" id="input-tag" value="New Video">

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="input-heading-pre">Heading (Normal)</label>
                    <input type="text" id="input-heading-pre" value="新作、">
                </div>
                <div>
                    <label for="input-heading-post">Heading (Accent)</label>
                    <input type="text" id="input-heading-post" value="公開しました。">
                </div>
            </div>

            <label for="input-artist">Artist Name</label>
            <input type="text" id="input-artist" value="フィンセント・ファン・ゴッホ">

            <label for="input-title">Artwork Title</label>
            <input type="text" id="input-title" value="ローヌ川の星月夜">

            <label for="input-code">Product Code / Edition</label>
            <input type="text" id="input-code" value="1888 / Musée d'Orsay">

            <div class="slider-row">
                <div>
                    <label for="input-heading-size">見出しサイズ <span id="heading-size-value" style="color: #D4AF37;">60px</span></label>
                    <input type="range" id="input-heading-size" min="24" max="120" value="60" style="cursor: pointer;">
                </div>
                <div>
                    <label for="input-title-size">タイトルサイズ <span id="title-size-value" style="color: #D4AF37;">60px</span></label>
                    <input type="range" id="input-title-size" min="24" max="120" value="60" style="cursor: pointer;">
                </div>
            </div>

            <h3 class="section-title">Image</h3>

            <label for="input-image">Artwork Image</label>
            <div class="mt-2 mb-5">
                <label for="input-image" class="image-upload-area">
                    <input type="file" id="input-image" accept="image/*" class="hidden">
                    <div class="upload-content">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span id="upload-text">クリックして画像を選択</span>
                    </div>
                </label>
            </div>

            <label for="input-image-size">画像サイズ <span id="image-size-value" style="color: #D4AF37;">100%</span></label>
            <input type="range" id="input-image-size" min="30" max="180" value="100" style="cursor: pointer;">

            <div class="slider-row">
                <div>
                    <label for="input-image-x">横位置 <span id="image-x-value" style="color: #D4AF37;">0px</span></label>
                    <input type="range" id="input-image-x" min="-300" max="300" value="0" style="cursor: pointer;">
                </div>
                <div>
                    <label for="input-image-y">縦位置 <span id="image-y-value" style="color: #D4AF37;">0px</span></label>
                    <input type="range" id="input-image-y" min="-300" max="300" value="0" style="cursor: pointer;">
                </div>
            </div>

            <div class="slider-row">
                <div>
                    <label for="input-image-radius">角丸 <span id="image-radius-value" style="color: #D4AF37;">12px</span></label>
                    <input type="range" id="input-image-radius" min="0" max="100" value="12" style="cursor: pointer;">
                </div>
                <div>
                    <label for="input-image-shadow">影の強さ <span id="image-shadow-value" style="color: #D4AF37;">60</span></label>
                    <input type="range" id="input-image-shadow" min="0" max="150" value="60" style="cursor: pointer;">
                </div>
            </div>

            <h3 class="section-title">Specifications</h3>

            <label for="input-spec-year">Exhibition Year</label>
            <input type="text" id="input-spec-year" value="1888年">

            <label for="input-spec-medium">Medium</label>
            <input type="text" id="input-spec-medium" value="油彩、キャンバス">

            <button onclick="downloadStory()" class="download-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span id="export-btn-text">Export Story (PNG)</span>
            </button>
            <p id="export-resolution" class="text-center text-apple-gray text-xs mt-4">2160 x 3840 High Resolution</p>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // Current state
        let currentFormat = 'story';
        let currentBgColor = '#000000';
        let currentAccentColor = '#ffd700';
        let currentImageSize = 100;
        let currentGradientEnabled = false;
        let currentGradientColor = '#1a1a2e';
        let currentGradientAngle = 180;

        // Dynamic canvas scaling
        function updateCanvasScale() {
            const container = document.getElementById('canvas-container');
            const wrapper = document.getElementById('canvas-wrapper');
            const canvasWidth = 1080;
            const canvasHeight = currentFormat === 'feed' ? 1080 : 1920;
            const availableWidth = wrapper.parentElement.clientWidth;
            // Leave some padding
            const maxWidth = Math.min(availableWidth - 16, 600);
            const scale = Math.min(maxWidth / canvasWidth, 0.35);
            container.style.transform = `scale(${scale})`;
            // Adjust margin-bottom to collapse the scaled space
            const scaledHeight = canvasHeight * scale;
            const marginBottom = -(canvasHeight - scaledHeight);
            container.style.marginBottom = marginBottom + 'px';
        }

        window.addEventListener('resize', updateCanvasScale);
        window.addEventListener('DOMContentLoaded', updateCanvasScale);

        // Base dimensions for image frame
        const baseFrameWidth = 920;
        const baseFrameHeightStory = 700;
        const baseFrameHeightFeed = 500;

        const inputs = [
            { id: 'input-tag', preview: 'preview-tag' },
            { id: 'input-heading-pre', preview: 'preview-heading-pre' },
            { id: 'input-heading-post', preview: 'preview-heading-post' },
            { id: 'input-artist', preview: 'preview-artist', sync: 'preview-spec-artist' },
            { id: 'input-title', preview: 'preview-title' },
            { id: 'input-code', preview: 'preview-code' },
            { id: 'input-spec-year', preview: 'preview-spec-year' },
            { id: 'input-spec-medium', preview: 'preview-spec-medium' }
        ];

        inputs.forEach(item => {
            const inputEl = document.getElementById(item.id);
            inputEl.addEventListener('input', (e) => {
                document.getElementById(item.preview).innerText = e.target.value;
                if (item.sync) {
                    document.getElementById(item.sync).innerText = e.target.value;
                }
            });
        });

        // Image size handler
        document.getElementById('input-image-size').addEventListener('input', (e) => {
            const size = parseInt(e.target.value);
            currentImageSize = size;
            document.getElementById('image-size-value').textContent = size + '%';
            updateImageSize();
        });

        function updateImageSize() {
            const scale = currentImageSize / 100;
            const frame = document.querySelector('.image-frame');
            const content = document.querySelector('.canvas-content');
            const baseHeight = currentFormat === 'feed' ? baseFrameHeightFeed : baseFrameHeightStory;
            const basePadTop = currentFormat === 'feed' ? 80 : 200;
            const basePadBottom = currentFormat === 'feed' ? 80 : 220;

            frame.style.width = (baseFrameWidth * scale) + 'px';
            frame.style.height = (baseHeight * scale) + 'px';

            // Distribute height change evenly between top and bottom padding
            const heightDelta = baseHeight * scale - baseHeight;
            const newPadTop = Math.max(40, basePadTop - heightDelta / 2);
            const newPadBottom = Math.max(40, basePadBottom - heightDelta / 2);
            content.style.paddingTop = newPadTop + 'px';
            content.style.paddingBottom = newPadBottom + 'px';
        }

        // Image position handler
        document.getElementById('input-image-x').addEventListener('input', (e) => {
            document.getElementById('image-x-value').textContent = e.target.value + 'px';
            updateImageTransform();
        });
        document.getElementById('input-image-y').addEventListener('input', (e) => {
            document.getElementById('image-y-value').textContent = e.target.value + 'px';
            updateImageTransform();
        });

        function updateImageTransform() {
            const x = document.getElementById('input-image-x').value;
            const y = document.getElementById('input-image-y').value;
            document.getElementById('main-visual').style.transform = `translate(${x}px, ${y}px)`;
        }

        // Image border-radius handler
        document.getElementById('input-image-radius').addEventListener('input', (e) => {
            document.getElementById('image-radius-value').textContent = e.target.value + 'px';
            document.getElementById('main-visual').style.borderRadius = e.target.value + 'px';
        });

        // Image shadow handler
        document.getElementById('input-image-shadow').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('image-shadow-value').textContent = val;
            document.getElementById('main-visual').style.filter = `drop-shadow(0 ${Math.round(val * 0.5)}px ${val}px rgba(0, 0, 0, 0.6))`;
        });

        // Heading size handler
        document.getElementById('input-heading-size').addEventListener('input', (e) => {
            const size = e.target.value + 'px';
            document.getElementById('heading-size-value').textContent = size;
            document.querySelector('#canvas-container h1').style.fontSize = size;
        });

        // Title size handler
        document.getElementById('input-title-size').addEventListener('input', (e) => {
            const size = e.target.value + 'px';
            document.getElementById('title-size-value').textContent = size;
            document.getElementById('preview-title').style.fontSize = size;
        });

        // Gradient controls
        function toggleGradient(enabled) {
            currentGradientEnabled = enabled;
            document.getElementById('gradient-controls').style.display = enabled ? 'block' : 'none';
            updateBackground();
        }

        function setGradientColor(color) {
            currentGradientColor = color;
            document.getElementById('input-gradient-color').value = color;
            document.querySelectorAll('#gradient-presets .color-preset').forEach(preset => {
                preset.classList.toggle('active', preset.dataset.color === color);
            });
            updateBackground();
        }

        document.getElementById('input-gradient-angle').addEventListener('input', (e) => {
            currentGradientAngle = parseInt(e.target.value);
            document.getElementById('gradient-angle-value').textContent = currentGradientAngle + '°';
            updateBackground();
        });

        function updateBackground() {
            const container = document.getElementById('canvas-container');
            if (currentGradientEnabled) {
                container.style.background = `linear-gradient(${currentGradientAngle}deg, ${currentBgColor}, ${currentGradientColor})`;
                container.style.backgroundColor = '';
            } else {
                container.style.background = '';
                container.style.backgroundColor = currentBgColor;
            }
        }

        // Image upload handler
        document.getElementById('input-image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('main-visual').src = event.target.result;
                    document.getElementById('upload-text').innerText = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // Format switching
        function setFormat(format) {
            currentFormat = format;
            const container = document.getElementById('canvas-container');

            // Update button states
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.format === format);
            });

            // Update canvas
            container.classList.remove('format-feed');
            if (format === 'feed') {
                container.classList.add('format-feed');
            }

            // Update export button text and resolution
            const btnText = document.getElementById('export-btn-text');
            const resolution = document.getElementById('export-resolution');
            if (format === 'story') {
                btnText.textContent = 'Export Story (PNG)';
                resolution.textContent = '2160 x 3840 High Resolution';
            } else {
                btnText.textContent = 'Export Feed (PNG)';
                resolution.textContent = '2160 x 2160 High Resolution';
            }

            // Re-apply image size and canvas scale for new format
            updateImageSize();
            updateCanvasScale();
        }

        // Background color
        function setBgColor(color) {
            currentBgColor = color;
            document.getElementById('input-bg-color').value = color;
            updateBackground();

            // Update presets
            document.querySelectorAll('#bg-presets .color-preset').forEach(preset => {
                preset.classList.toggle('active', preset.dataset.color === color);
            });

            // Adjust text color for light backgrounds
            const isLight = isLightColor(color);
            document.querySelectorAll('#canvas-container .text-white').forEach(el => {
                el.style.color = isLight ? '#000000' : '#ffffff';
            });
            document.querySelectorAll('#canvas-container .text-apple-gray').forEach(el => {
                el.style.color = isLight ? '#555555' : '#86868b';
            });
            document.querySelectorAll('#canvas-container .border-spec-border').forEach(el => {
                el.style.borderColor = isLight ? '#cccccc' : '#333333';
            });
        }

        // Accent color
        function setAccentColor(color) {
            currentAccentColor = color;
            document.documentElement.style.setProperty('--accent-color', color);
            document.documentElement.style.setProperty('--accent-color-dark', adjustColor(color, -20));
            document.getElementById('input-accent-color').value = color;

            // Update presets
            document.querySelectorAll('#accent-presets .color-preset').forEach(preset => {
                preset.classList.toggle('active', preset.dataset.color === color);
            });
        }

        // Helper: check if color is light
        function isLightColor(color) {
            const hex = color.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128;
        }

        // Helper: adjust color brightness
        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        async function downloadStory() {
            const canvasContainer = document.getElementById('canvas-container');
            const btn = document.querySelector('.download-btn');
            const originalBtnText = btn.innerHTML;

            btn.innerHTML = 'Generating...';
            btn.disabled = true;

            // Get dimensions based on format
            const width = 1080;
            const height = currentFormat === 'story' ? 1920 : 1080;

            // Clone the element for capture to avoid modifying the original
            const clone = canvasContainer.cloneNode(true);
            clone.style.transform = 'none';
            clone.style.marginBottom = '0';
            clone.style.position = 'absolute';
            clone.style.top = '-9999px';
            clone.style.left = '-9999px';
            clone.style.zIndex = '-1';
            clone.style.width = width + 'px';
            clone.style.height = height + 'px';
            document.body.appendChild(clone);

            // Wait for images to load in clone
            const images = clone.querySelectorAll('img');
            await Promise.all(Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                });
            }));

            try {
                const canvas = await html2canvas(clone, {
                    width: width,
                    height: height,
                    scale: 2,
                    backgroundColor: currentGradientEnabled ? null : currentBgColor,
                    useCORS: true,
                    logging: false,
                    allowTaint: true,
                    onclone: (clonedDoc) => {
                        const clonedContainer = clonedDoc.body.querySelector('#canvas-container');
                        if (clonedContainer) {
                            clonedContainer.style.transform = 'none';
                        }
                    }
                });

                const link = document.createElement('a');
                const title = document.getElementById('input-title').value.replace(/\s+/g, '_');
                const formatName = currentFormat === 'story' ? 'Story' : 'Feed';
                link.download = `${formatName}_${title}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
                alert('書き出し中にエラーが発生しました。');
            } finally {
                document.body.removeChild(clone);
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
